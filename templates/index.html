<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audiobook Digitizer</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        h1 { color: #333; }
        .library {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .book {
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            background: #f9f9f9;
        }
        .book-cover-link {
            text-decoration: none;
            color: inherit;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .book-cover {
            background: #e0e0e0;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #888;
        }
        .book-title {
            padding: 10px;
            font-size: 0.9rem;
            word-break: break-word;
            font-weight: bold;
        }
        .book-actions {
            display: flex;
            padding: 10px;
            background: #eee;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        .delete-form {
            flex: 1;
        }
        .btn { padding: 10px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #0056b3; }
        .btn-edit {
            background: #28a745;
            padding: 5px 10px;
            font-size: 0.8rem;
            flex: 1;
            text-align: center;
        }
        .btn-edit:hover {
            background: #218838;
        }
        .btn-delete {
            background: #dc3545;
            padding: 5px 10px;
            font-size: 0.8rem;
            width: 100%;
        }
        .btn-delete:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <h1>My Audiobooks</h1>
    <a href="/new" class="btn">New Audiobook</a>
    <hr>
    <div class="library">
        {% if books %}
            {% for book in books %}
                <div class="book">
                    <a href="/open/{{ book }}" class="book-cover-link" title="Open file location">
                        <div class="book-cover">
                            <img src="/cover/{{ book }}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <span style="display: none;">🎵</span>
                        </div>
                        <div class="book-title">{{ book }}</div>
                    </a>
                    <div class="book-actions">
                        <a href="/metadata/{{ book }}" class="btn btn-edit">Edit</a>
                        <form action="/delete/{{ book }}" method="POST" class="delete-form" onsubmit="return confirm('Are you sure you want to delete {{ book }}?');">
                            <button type="submit" class="btn btn-delete">Delete</button>
                        </form>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p>No audiobooks in library yet.</p>
        {% endif %}
    </div>
</body>
</html>
