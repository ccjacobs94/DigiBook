<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Metadata: {{ book_name }}</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 800px; }
        .container { display: flex; gap: 2rem; }
        .col { flex: 1; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .btn { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        .cover-preview { margin-top: 10px; max-width: 200px; max-height: 200px; border: 1px solid #ccc; display: none; }

        .search-section { border: 1px solid #ccc; padding: 15px; border-radius: 5px; background: #f9f9f9; margin-bottom: 20px; }
        .search-results { max-height: 300px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; background: white; }
        .result-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .result-item:hover { background: #f0f8ff; }
        .result-thumbnail { width: 50px; height: 75px; background: #ddd; object-fit: cover; }
        .result-details { flex: 1; }
        .result-title { font-weight: bold; }
        .result-author { font-size: 0.9em; color: #555; }
        .loading { display: none; margin-top: 10px; color: #007bff; font-weight: bold; }
        .no-results { padding: 10px; color: #d9534f; }
    </style>
</head>
<body>
    <h1>Edit Metadata for {{ book_name }}</h1>

    <div class="search-section">
        <h3>Search & Select Edition</h3>
        <p style="font-size: 0.9em; color: #666;">Search Open Library to automatically fill metadata fields.</p>
        <input type="text" id="search_input" placeholder="Search by title...">
        <div id="search_loading" class="loading">Searching...</div>
        <div id="search_results" class="search-results"></div>
    </div>

    <form action="{{ url_for('edit_metadata', book_name=book_name) }}" method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ metadata.title }}">
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" value="{{ metadata.author }}">
        </div>
        <div class="form-group">
            <label for="narrator">Narrator</label>
            <input type="text" id="narrator" name="narrator" value="{{ metadata.narrator }}">
        </div>
        <div class="form-group">
            <label for="year">Year</label>
            <input type="text" id="year" name="year" value="{{ metadata.year }}">
        </div>
        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" value="{{ metadata.isbn }}">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ metadata.description }}</textarea>
        </div>
        <div class="form-group">
            <label for="cover_url">Cover Image URL</label>
            <input type="text" id="cover_url" name="cover_url" value="{{ metadata.cover_url }}" oninput="updateCoverPreview()">
            <img id="cover_preview" class="cover-preview" alt="Cover Preview">
        </div>
        <button type="submit" class="btn">Save & Finish</button>
    </form>

    <script>
        const originalTitle = "{{ original_title|default('') }}";
        const hasTags = {{ 'true' if hasTags else 'false' }};
        const searchInput = document.getElementById('search_input');
        const searchResults = document.getElementById('search_results');
        const searchLoading = document.getElementById('search_loading');

        let searchTimeout = null;
        const searchCache = new Map();

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (searchTimeout) clearTimeout(searchTimeout);

            if (query.length < 2) {
                searchResults.innerHTML = '';
                return;
            }

            searchTimeout = setTimeout(() => {
                performSearch(query);
            }, 400); // 400ms debounce
        });

        async function performSearch(query) {
            if (searchCache.has(query)) {
                renderResults(searchCache.get(query));
                return;
            }

            searchLoading.style.display = 'block';
            searchResults.innerHTML = '';

            try {
                const response = await fetch(`/api/search_metadata?title=${encodeURIComponent(query)}`);
                const data = await response.json();
                searchCache.set(query, data);
                renderResults(data);
            } catch (error) {
                console.error("Error searching:", error);
                searchResults.innerHTML = '<div class="no-results">Error fetching results.</div>';
            } finally {
                searchLoading.style.display = 'none';
            }
        }

        function renderResults(results) {
            searchResults.innerHTML = '';
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="no-results">No results found - enter manually</div>';
                return;
            }

            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'result-item';

                const img = document.createElement('img');
                img.className = 'result-thumbnail';
                if (result.cover_url) {
                    img.src = result.cover_url;
                }

                const details = document.createElement('div');
                details.className = 'result-details';

                const title = document.createElement('div');
                title.className = 'result-title';
                title.textContent = result.title;

                const authorYear = document.createElement('div');
                authorYear.className = 'result-author';
                authorYear.textContent = `${result.author} ${result.year ? '(' + result.year + ')' : ''}`;

                details.appendChild(title);
                details.appendChild(authorYear);

                item.appendChild(img);
                item.appendChild(details);

                item.addEventListener('click', () => selectResult(result));
                searchResults.appendChild(item);
            });
        }

        async function selectResult(result) {
            document.getElementById('title').value = result.title;
            document.getElementById('author').value = result.author;
            document.getElementById('year').value = result.year;
            document.getElementById('isbn').value = result.isbn;
            document.getElementById('cover_url').value = result.cover_url_large;
            updateCoverPreview();

            // Clear current description, show it's loading
            const descField = document.getElementById('description');
            descField.value = "Loading description...";

            if (result.work_id) {
                try {
                    const response = await fetch(`/api/work_description?work_id=${encodeURIComponent(result.work_id)}`);
                    const data = await response.json();
                    descField.value = data.description || '';
                } catch (error) {
                    console.error("Error fetching description:", error);
                    descField.value = '';
                }
            } else {
                descField.value = '';
            }

            // Optionally, scroll to form or collapse search results
            // searchResults.innerHTML = '';
        }

        function updateCoverPreview() {
            const url = document.getElementById('cover_url').value;
            const img = document.getElementById('cover_preview');
            if (url) {
                img.src = url;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }
        // Initialize on load
        window.onload = () => {
            updateCoverPreview();

            // If we don't have tags and we have an original title, automatically search
            const hasTagsValue = "{{ 'true' if has_tags else 'false' }}" === "true";
            if (!hasTagsValue && originalTitle) {
                searchInput.value = originalTitle;
                performSearch(originalTitle);
            }
        };
    </script>
</body>
</html>
