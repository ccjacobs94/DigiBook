<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Metadata: {{ book_name }}</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .btn:hover { background: #0056b3; }
        .cover-preview { margin-top: 10px; max-width: 200px; max-height: 200px; border: 1px solid #ccc; display: none; }
    </style>
</head>
<body>
    <h1>Edit Metadata for {{ book_name }}</h1>
    <form action="{{ url_for('edit_metadata', book_name=book_name) }}" method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{ metadata.title }}">
        </div>
        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" name="author" value="{{ metadata.author }}">
        </div>
        <div class="form-group">
            <label for="narrator">Narrator</label>
            <input type="text" id="narrator" name="narrator" value="{{ metadata.narrator }}">
        </div>
        <div class="form-group">
            <label for="year">Year</label>
            <input type="text" id="year" name="year" value="{{ metadata.year }}">
        </div>
        <div class="form-group">
            <label for="cover_url">Cover Image URL</label>
            <input type="text" id="cover_url" name="cover_url" value="{{ metadata.cover_url }}" oninput="updateCoverPreview()">
            <img id="cover_preview" class="cover-preview" alt="Cover Preview">
        </div>
        <button type="submit" class="btn">Save & Finish</button>
    </form>

    <script>
        function updateCoverPreview() {
            const url = document.getElementById('cover_url').value;
            const img = document.getElementById('cover_preview');
            if (url) {
                img.src = url;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }
        // Initialize on load
        window.onload = updateCoverPreview;
    </script>
</body>
</html>
