<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Audiobook</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        .form-group { margin-bottom: 15px; }
        input[type="text"] { padding: 8px; width: 300px; }
        .btn { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        .btn:hover { background: #218838; }
        .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; Back to Library</a>
    <h1>Start New Audiobook</h1>
    <form action="/new" method="POST">
        <div class="form-group">
            <label for="book_name">Audiobook Name:</label><br>
            <input type="text" id="book_name" name="book_name" required>
        </div>
        <div class="form-group">
            <label for="cd_drive">CD Drive Path (Optional):</label><br>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="cd_drive" name="cd_drive">
                <button type="button" id="browse_btn" class="btn" style="background: #6c757d; padding: 8px 12px;">Browse...</button>
            </div>
        </div>
        <button type="submit" class="btn">Start Ripping</button>
    </form>

    <script>
        document.getElementById('browse_btn').addEventListener('click', async () => {
            const btn = document.getElementById('browse_btn');
            const input = document.getElementById('cd_drive');
            btn.disabled = true;
            btn.innerText = "Browsing...";
            try {
                const response = await fetch('/select_drive');
                if (response.ok) {
                    const data = await response.json();
                    if (data.path) {
                        input.value = data.path;
                    }
                } else {
                    console.error("Error fetching drive path.");
                }
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Browse...";
            }
        });
    </script>
</body>
</html>
